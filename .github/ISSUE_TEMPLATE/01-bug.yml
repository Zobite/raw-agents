name: 🐛 Bug Report
description: Report a bug to help us improve Raw Agents
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the form below to help us resolve the issue.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the problem...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: |
        Please outline the steps to reproduce this behavior.
        Providing a minimal code snippet, configuration, or environment setup is highly appreciated.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened...
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Logs
      description: If applicable, add screenshots or logs to help explain your problem.
      placeholder: Drag and drop screenshots or paste log snippets here...
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Which environment did you experience this issue in?
      multiple: true
      options:
        - macOS (Local Dev)
        - Linux (Local Dev)
        - Windows (Local Dev)
        - Docker
        - Production deployment
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Please share the version of Bun and Raw Agents you are using.
      placeholder: Bun v1.2.0, Raw Agents v0.1.0
    validations:
      required: true
