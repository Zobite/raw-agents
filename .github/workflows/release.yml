name: Build and Release

on:
  push:
    tags:
      - "v*"

# ── Shared environment ──────────────────────────────────────────────────────
env:
  REGISTRY: docker.io
  IMAGE_NAME: zobite/raw-agents

jobs:
  # ── Job 1: Build amd64 (native on ubuntu) ───────────────────────────────
  build-amd64:
    name: Build linux/amd64
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.ref_name }}-amd64
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

  # ── Job 2: Build arm64 (native on ARM runner) ──────────────────────────
  build-arm64:
    name: Build linux/arm64
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: Build and push (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          provenance: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.ref_name }}-arm64
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

  # ── Job 3: Create multi-arch manifest & push final tags ────────────────
  merge-manifest:
    name: Create Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    permissions:
      contents: write

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Create and push multi-arch manifests
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          TAG="${{ github.ref_name }}"
          SOURCE_AMD64="${{ env.IMAGE_NAME }}:${TAG}-amd64"
          SOURCE_ARM64="${{ env.IMAGE_NAME }}:${TAG}-arm64"

          # Create a manifest for each desired tag
          while IFS= read -r DEST_TAG; do
            [ -z "${DEST_TAG}" ] && continue
            echo "→ Creating manifest: ${DEST_TAG}"
            docker buildx imagetools create -t "${DEST_TAG}" \
              "${SOURCE_AMD64}" "${SOURCE_ARM64}"
          done <<< "${TAGS}"
